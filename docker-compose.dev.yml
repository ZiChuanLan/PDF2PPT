services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_API_PORT=${NEXT_PUBLIC_API_PORT:-8000}
    depends_on:
      - api
    networks:
      - app-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["sh", "/app/scripts/run_api.sh"]
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - paddlex-cache:/root/.paddlex
      - paddle-cache:/root/.cache/paddle
    env_file:
      - .env
    environment:
      - OCR_PADDLE_LAYOUT_PREWARM=${OCR_PADDLE_LAYOUT_PREWARM:-1}
      - OCR_PADDLE_LAYOUT_PREWARM_TARGET=${OCR_PADDLE_LAYOUT_PREWARM_TARGET:-worker}
      - APP_SERVICE_ROLE=api
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    networks:
      - app-network

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["sh", "/app/scripts/run_worker.sh"]
    volumes:
      - ./api:/app
      - paddlex-cache:/root/.paddlex
      - paddle-cache:/root/.cache/paddle
    env_file:
      - .env
    environment:
      - OCR_PADDLE_LAYOUT_PREWARM=${OCR_PADDLE_LAYOUT_PREWARM:-1}
      - OCR_PADDLE_LAYOUT_PREWARM_TARGET=${OCR_PADDLE_LAYOUT_PREWARM_TARGET:-worker}
      - APP_SERVICE_ROLE=worker
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  paddlex-cache:
  paddle-cache:
